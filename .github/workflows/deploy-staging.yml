# ============================================================================
# Lunaz — Deploy to Staging
# ============================================================================
# Automatically deploys to staging environment when code is pushed to staging branch
# ============================================================================

name: Deploy to Staging

on:
  push:
    branches: [staging]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: staging-${{ github.sha }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Build and Push Images
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        app: [backend, web, manage]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/${{ matrix.app }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # Deploy to Staging Server
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/lunaz
            
            # Pull latest images
            export IMAGE_TAG=${{ env.IMAGE_TAG }}
            docker compose -f docker-compose.staging.yml pull
            
            # Deploy with zero-downtime
            docker compose -f docker-compose.staging.yml up -d --remove-orphans
            
            # Cleanup old images
            docker system prune -f

      - name: Wait for healthy state
        run: |
          echo "Waiting for services to be healthy..."
          for i in {1..30}; do
            if curl -sf "${{ secrets.STAGING_URL }}/api/v1/health"; then
              echo "✓ Health check passed"
              exit 0
            fi
            echo "Attempt $i/30 - Waiting for service..."
            sleep 10
          done
          echo "✗ Health check failed after 5 minutes"
          exit 1

      - name: Run smoke tests
        run: |
          # Basic API health check
          curl -sf "${{ secrets.STAGING_URL }}/api/v1/health" || exit 1
          
          # Check frontend is serving
          curl -sf "${{ secrets.STAGING_URL }}" -o /dev/null || exit 1
          
          echo "✓ Smoke tests passed"

  # ─────────────────────────────────────────────────────────────────────────────
  # Notifications
  # ─────────────────────────────────────────────────────────────────────────────
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Notify on success
        if: needs.deploy.result == 'success'
        uses: slackapi/slack-github-action@v2
        with:
          payload: |
            {
              "text": "✅ Staging deployment successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*✅ Staging Deployment Successful*\n\n*Commit:* `${{ github.sha }}`\n*Branch:* `staging`\n*Author:* ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

      - name: Notify on failure
        if: needs.deploy.result == 'failure'
        uses: slackapi/slack-github-action@v2
        with:
          payload: |
            {
              "text": "⚠️ Staging deployment failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*⚠️ Staging Deployment Failed*\n\n*Commit:* `${{ github.sha }}`\n*Branch:* `staging`\n*Author:* ${{ github.actor }}\n\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow run>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true
