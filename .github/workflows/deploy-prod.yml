# ============================================================================
# Lunaz — Deploy to Production
# ============================================================================
# Deploys to production with manual approval gate
# Supports rollback via workflow_dispatch
# ============================================================================

name: Deploy to Production

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      rollback_tag:
        description: 'Tag to rollback to (e.g. v2026.02.17-cc0961d, leave empty for current)'
        required: false
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Build and Push Images
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build Images
    runs-on: ubuntu-latest
    if: github.event.inputs.rollback_tag == ''
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        app: [backend, web]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute release tag
        id: vars
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          BUILD_DATE=$(date -u +%Y.%m.%d)
          TAG_NAME="v${BUILD_DATE}-${SHORT_SHA}"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.app }}:${{ steps.vars.outputs.tag_name }}
            ghcr.io/${{ github.repository }}/${{ matrix.app }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # Manual Approval Gate
  # ─────────────────────────────────────────────────────────────────────────────
  approval:
    name: Approval Gate
    runs-on: ubuntu-latest
    needs: build
    if: always() && (needs.build.result == 'success' || needs.build.result == 'skipped')
    environment: development
    steps:
      - name: Deployment approved
        run: |
          echo "Production deployment approved"
          echo "Deploying: ${{ github.event.inputs.rollback_tag || 'current commit' }}"

  # ─────────────────────────────────────────────────────────────────────────────
  # Deploy to Production Server
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: approval
    environment: production
    outputs:
      deployed_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine deployment tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.rollback_tag }}" ]; then
            echo "tag=${{ github.event.inputs.rollback_tag }}" >> $GITHUB_OUTPUT
            echo "Rolling back to: ${{ github.event.inputs.rollback_tag }}"
          else
            SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
            BUILD_DATE=$(date -u +%Y.%m.%d)
            TAG_NAME="v${BUILD_DATE}-${SHORT_SHA}"
            echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
            echo "Deploying: $TAG_NAME"
          fi

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/lunaz
            
            # Set image tag (same format as CI/EC2)
            export TAG=${{ steps.tag.outputs.tag }}
            export REGISTRY_IMAGE=ghcr.io/${{ github.repository }}
            
            # Pull latest images
            docker compose -f docker-compose.prod.yml pull
            
            # Deploy with zero-downtime
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            
            # Cleanup old images
            docker system prune -f

      - name: Health check
        id: health
        run: |
          echo "Waiting for services to be healthy..."
          for i in {1..30}; do
            if curl -sf "${{ secrets.PROD_URL }}/api/v1/health"; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i/30 - Waiting for service..."
            sleep 10
          done
          echo "Health check failed after 5 minutes"
          exit 1

      - name: Run smoke tests
        run: |
          # Basic API health check
          curl -sf "${{ secrets.PROD_URL }}/api/v1/health" || exit 1
          
          # Check frontend is serving (manage at /manage)
          curl -sf "${{ secrets.PROD_URL }}" -o /dev/null || exit 1
          curl -sf "${{ secrets.PROD_URL }}/manage" -o /dev/null || exit 1
          
          echo "Smoke tests passed"

  # ─────────────────────────────────────────────────────────────────────────────
  # Rollback on Failure
  # ─────────────────────────────────────────────────────────────────────────────
  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: deploy
    if: failure() && github.event.inputs.rollback_tag == ''
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get previous deployment tag
        id: previous
        run: |
          git fetch --tags
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            echo "::error::No previous release tag found for rollback"
            exit 1
          fi
          echo "tag=$PREV_TAG" >> $GITHUB_OUTPUT
          echo "Rolling back to: $PREV_TAG"

      - name: Rollback deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/lunaz
            
            # Set previous image tag
            export TAG=${{ steps.previous.outputs.tag }}
            export REGISTRY_IMAGE=ghcr.io/${{ github.repository }}
            
            # Rollback to previous version
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            
            echo "Rolled back to ${{ steps.previous.outputs.tag }}"

  # ─────────────────────────────────────────────────────────────────────────────
  # Create Deployment Record
  # ─────────────────────────────────────────────────────────────────────────────
  record:
    name: Record Deployment
    runs-on: ubuntu-latest
    needs: deploy
    if: success()
    permissions:
      deployments: write
    steps:
      - name: Create GitHub deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: '${{ needs.deploy.outputs.deployed_tag }}',
              environment: 'production',
              auto_merge: false,
              required_contexts: []
            });
            
            if (deployment.data.id) {
              await github.rest.repos.createDeploymentStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: deployment.data.id,
                state: 'success',
                environment_url: '${{ secrets.PROD_URL }}'
              });
            }

  # ─────────────────────────────────────────────────────────────────────────────
  # Notifications
  # ─────────────────────────────────────────────────────────────────────────────
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [deploy, rollback]
    if: always()
    steps:
      - name: Notify on success
        if: needs.deploy.result == 'success'
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Production deployment successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Production Deployment Successful*\n\n*Tag:* `${{ needs.deploy.outputs.deployed_tag }}`\n*Author:* ${{ github.actor }}\n*URL:* ${{ secrets.PROD_URL }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

      - name: Notify on failure
        if: needs.deploy.result == 'failure'
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Production deployment failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Production Deployment Failed*\n\n*Commit:* `${{ github.sha }}`\n*Author:* ${{ github.actor }}\n\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow run>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

      - name: Notify on rollback
        if: needs.rollback.result == 'success'
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Production rolled back",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Production Rolled Back*\n\nAutomatic rollback triggered due to deployment failure.\n\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow run>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true
