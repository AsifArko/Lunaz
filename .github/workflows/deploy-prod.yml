# ============================================================================
# Lunaz — Deploy to Production
# ============================================================================
# Deploys to production with manual approval gate
# Supports rollback via workflow_dispatch
# ============================================================================

name: Deploy to Production

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      rollback_sha:
        description: 'SHA to rollback to (leave empty for current commit)'
        required: false
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Build and Push Images
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build Images
    runs-on: ubuntu-latest
    if: github.event.inputs.rollback_sha == ''
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        app: [backend, web, manage]
    outputs:
      image_tag: prod-${{ github.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.app }}:prod-${{ github.sha }}
            ghcr.io/${{ github.repository }}/${{ matrix.app }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # Manual Approval Gate
  # ─────────────────────────────────────────────────────────────────────────────
  approval:
    name: Approval Gate
    runs-on: ubuntu-latest
    needs: build
    if: always() && (needs.build.result == 'success' || needs.build.result == 'skipped')
    environment: production-approval
    steps:
      - name: Deployment approved
        run: |
          echo "✓ Production deployment approved"
          echo "Deploying commit: ${{ github.event.inputs.rollback_sha || github.sha }}"

  # ─────────────────────────────────────────────────────────────────────────────
  # Deploy to Production Server
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: approval
    environment: production
    outputs:
      deployed_sha: ${{ steps.sha.outputs.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine deployment SHA
        id: sha
        run: |
          if [ -n "${{ github.event.inputs.rollback_sha }}" ]; then
            echo "sha=${{ github.event.inputs.rollback_sha }}" >> $GITHUB_OUTPUT
            echo "🔄 Rolling back to: ${{ github.event.inputs.rollback_sha }}"
          else
            echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT
            echo "🚀 Deploying: ${{ github.sha }}"
          fi

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/lunaz
            
            # Set image tag
            export IMAGE_TAG=prod-${{ steps.sha.outputs.sha }}
            
            # Pull latest images
            docker compose -f docker-compose.prod.yml pull
            
            # Deploy with zero-downtime
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            
            # Cleanup old images
            docker system prune -f

      - name: Health check
        id: health
        run: |
          echo "Waiting for services to be healthy..."
          for i in {1..30}; do
            if curl -sf "${{ secrets.PROD_URL }}/api/v1/health"; then
              echo "✓ Health check passed"
              exit 0
            fi
            echo "Attempt $i/30 - Waiting for service..."
            sleep 10
          done
          echo "✗ Health check failed after 5 minutes"
          exit 1

      - name: Run smoke tests
        run: |
          # Basic API health check
          curl -sf "${{ secrets.PROD_URL }}/api/v1/health" || exit 1
          
          # Check frontend is serving
          curl -sf "${{ secrets.PROD_URL }}" -o /dev/null || exit 1
          
          # Check manage app is serving
          curl -sf "${{ secrets.PROD_MANAGE_URL }}" -o /dev/null || exit 1
          
          echo "✓ Smoke tests passed"

  # ─────────────────────────────────────────────────────────────────────────────
  # Rollback on Failure
  # ─────────────────────────────────────────────────────────────────────────────
  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: deploy
    if: failure() && github.event.inputs.rollback_sha == ''
    environment: production
    steps:
      - name: Get previous deployment
        id: previous
        run: |
          # Get previous successful deployment SHA from git
          PREV_SHA=$(git rev-parse HEAD~1 2>/dev/null || echo "")
          if [ -n "$PREV_SHA" ]; then
            echo "sha=$PREV_SHA" >> $GITHUB_OUTPUT
            echo "⚠️ Rolling back to previous deployment: $PREV_SHA"
          else
            echo "⚠️ No previous deployment found, manual intervention required"
            exit 1
          fi

      - name: Rollback deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/lunaz
            
            # Set previous image tag
            export IMAGE_TAG=prod-${{ steps.previous.outputs.sha }}
            
            # Rollback to previous version
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            
            echo "✓ Rollback completed"

  # ─────────────────────────────────────────────────────────────────────────────
  # Create Deployment Record
  # ─────────────────────────────────────────────────────────────────────────────
  record:
    name: Record Deployment
    runs-on: ubuntu-latest
    needs: deploy
    if: success()
    permissions:
      deployments: write
    steps:
      - name: Create GitHub deployment
        uses: actions/github-script@v8
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: '${{ needs.deploy.outputs.deployed_sha }}',
              environment: 'production',
              auto_merge: false,
              required_contexts: []
            });
            
            if (deployment.data.id) {
              await github.rest.repos.createDeploymentStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: deployment.data.id,
                state: 'success',
                environment_url: '${{ secrets.PROD_URL }}'
              });
            }

  # ─────────────────────────────────────────────────────────────────────────────
  # Notifications
  # ─────────────────────────────────────────────────────────────────────────────
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [deploy, rollback]
    if: always()
    steps:
      - name: Notify on success
        if: needs.deploy.result == 'success'
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ Production deployment successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*✅ Production Deployment Successful*\n\n*Commit:* `${{ needs.deploy.outputs.deployed_sha }}`\n*Author:* ${{ github.actor }}\n*URL:* ${{ secrets.PROD_URL }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

      - name: Notify on failure
        if: needs.deploy.result == 'failure'
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🚨 Production deployment failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*🚨 Production Deployment Failed*\n\n*Commit:* `${{ github.sha }}`\n*Author:* ${{ github.actor }}\n\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow run>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

      - name: Notify on rollback
        if: needs.rollback.result == 'success'
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "⚠️ Production rolled back",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*⚠️ Production Rolled Back*\n\nAutomatic rollback triggered due to deployment failure.\n\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow run>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true
