# ============================================================================
# Lunaz — Deploy to AWS EC2
# ============================================================================
# Triggers: Push to master (after CI), or manual workflow_dispatch
# Requires: EC2_HOST, EC2_USER, EC2_SSH_KEY, GHCR_TOKEN (if private images)
# ============================================================================

name: Deploy to EC2

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]
  workflow_dispatch:
    inputs:
      rollback_sha:
        description: 'Short SHA to rollback to (e.g. abc1234, leave empty for latest)'
        required: false
        type: string

concurrency:
  group: deploy-ec2
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Deploy (runs after CI succeeds, or on manual dispatch)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine deployment tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.rollback_sha }}" ]; then
            echo "short_sha=${{ github.event.inputs.rollback_sha }}" >> $GITHUB_OUTPUT
            echo "🔄 Rolling back to: ${{ github.event.inputs.rollback_sha }}"
          elif [ "${{ github.event_name }}" == "workflow_run" ]; then
            SHORT_SHA=$(echo ${{ github.event.workflow_run.head_sha }} | cut -c1-7)
            echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
            echo "🚀 Deploying from CI: $SHORT_SHA"
          else
            SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
            echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
            echo "🚀 Deploying current commit: $SHORT_SHA"
          fi

      - name: Setup EC2 directory
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo mkdir -p /opt/lunaz
            sudo chown ${{ secrets.EC2_USER }}:${{ secrets.EC2_USER }} /opt/lunaz

      - name: Copy docker-compose to EC2
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.ec2.yml"
          target: "/opt/lunaz"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /opt/lunaz

            # Login to GHCR if token provided (for private images)
            if [ -n "${{ secrets.GHCR_TOKEN }}" ]; then
              echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            fi

            # Set deployment variables
            export TAG=${{ steps.tag.outputs.short_sha }}
            export REGISTRY_IMAGE=ghcr.io/${{ github.repository }}

            # Pull and deploy
            docker compose -f docker-compose.ec2.yml pull
            docker compose -f docker-compose.ec2.yml up -d --remove-orphans

            # Cleanup old images
            docker system prune -f

            echo "✓ Deployed build-${{ steps.tag.outputs.short_sha }}"

      - name: Health check
        id: health
        run: |
          echo "Waiting for services to be healthy..."
          for i in $(seq 1 30); do
            if curl -sf "${{ secrets.PROD_API_URL }}/health" > /dev/null; then
              echo "✓ Backend health check passed"
              exit 0
            fi
            echo "Attempt $i/30 - Waiting..."
            sleep 10
          done
          echo "✗ Health check failed after 5 minutes"
          exit 1

      - name: Smoke tests
        run: |
          # Backend health
          curl -sf "${{ secrets.PROD_API_URL }}/health" || exit 1

          # Web (if PROD_URL set)
          if [ -n "${{ secrets.PROD_URL }}" ]; then
            curl -sf "${{ secrets.PROD_URL }}" -o /dev/null || exit 1
          fi

          # Manage (if PROD_MANAGE_URL set)
          if [ -n "${{ secrets.PROD_MANAGE_URL }}" ]; then
            curl -sf "${{ secrets.PROD_MANAGE_URL }}" -o /dev/null || exit 1
          fi

          echo "✓ Smoke tests passed"

  # ─────────────────────────────────────────────────────────────────────────────
  # Rollback on failure
  # ─────────────────────────────────────────────────────────────────────────────
  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: deploy
    if: always() && needs.deploy.result == 'failure' && github.event.inputs.rollback_sha == ''
    environment: production
    steps:
      - name: Get previous successful run
        id: prev
        uses: actions/github-script@v7
        with:
          script: |
            const currentRunId = context.payload.workflow_run?.id || 0;
            const runs = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              branch: 'master',
              status: 'success',
              per_page: 10
            });
            const prevRun = runs.data.workflow_runs.find(r => r.id !== currentRunId);
            const shortSha = prevRun ? prevRun.head_sha.substring(0, 7) : '';
            core.setOutput('short_sha', shortSha);
            if (!shortSha) {
              core.setFailed('No previous successful deployment found');
            }

      - name: Rollback deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /opt/lunaz
            export TAG=${{ steps.prev.outputs.short_sha }}
            export REGISTRY_IMAGE=ghcr.io/${{ github.repository }}
            docker compose -f docker-compose.ec2.yml pull
            docker compose -f docker-compose.ec2.yml up -d --remove-orphans
            echo "✓ Rolled back to ${{ steps.prev.outputs.short_sha }}"
