# ============================================================================
# Lunaz — CI Pipeline
# ============================================================================
# PR → master: Lint, Test, Build
# Push to master: + Docker build, Build tag, triggers deploy-ec2
# ============================================================================

name: CI

on:
  push:
    branches: [master, 'feature/*', 'fix/*', 'task/*']
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Lint Stage
  # ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: TypeScript type check
        run: npm run typecheck

  # ─────────────────────────────────────────────────────────────────────────────
  # Test Stage
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping: 1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci


      - name: Run tests
        run: npm run test
        env:
          MONGODB_URI: mongodb://localhost:27017/lunaz-test
          JWT_SECRET: test-secret-for-ci
          NODE_ENV: test

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────────────────────
  # Build Stage
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci


      - name: Build all workspaces
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            apps/*/dist
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Prepare release tag (master only) — single source for Git, Docker, deployment
  # Format: vYYYY.MM.DD-<short_sha> (CalVer style, e.g. v2026.02.17-cc0961d)
  # ─────────────────────────────────────────────────────────────────────────────
  prepare:
    name: Prepare Release Tag
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/master'
    outputs:
      tag_name: ${{ steps.vars.outputs.tag_name }}
      short_sha: ${{ steps.vars.outputs.short_sha }}
    steps:
      - name: Compute release tag
        id: vars
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          BUILD_DATE=$(date -u +%Y.%m.%d)
          TAG_NAME="v${BUILD_DATE}-${SHORT_SHA}"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "Release tag: $TAG_NAME"

  # ─────────────────────────────────────────────────────────────────────────────
  # Docker Build Stage (master only)
  # ─────────────────────────────────────────────────────────────────────────────
  docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [build, prepare]
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - app: backend
            dockerfile: apps/backend/Dockerfile
            context: .
          - app: web
            dockerfile: apps/web/Dockerfile
            context: .
          - app: nginx
            dockerfile: infra/nginx/Dockerfile
            context: infra/nginx
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.app }}:${{ needs.prepare.outputs.tag_name }}
            ghcr.io/${{ github.repository }}/${{ matrix.app }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # Create Build Tag (master only)
  # ─────────────────────────────────────────────────────────────────────────────
  tag:
    name: Create Release Tag
    runs-on: ubuntu-latest
    needs: [docker, prepare]
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push release tag
        run: |
          TAG_NAME="${{ needs.prepare.outputs.tag_name }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG_NAME" -m "Release $TAG_NAME from ${{ github.sha }}"
          git push origin "$TAG_NAME"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          name: ${{ needs.prepare.outputs.tag_name }}
          body: |
            **Release** from commit `${{ github.sha }}`
            - Docker images: `ghcr.io/${{ github.repository }}/backend:${{ needs.prepare.outputs.tag_name }}`, `web:${{ needs.prepare.outputs.tag_name }}`
          prerelease: true
