services:
  mongodb:
    image: mongo:7
    container_name: lunaz-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: lunaz
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lunaz-network

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: lunaz-backend
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 4000
      MONGODB_URI: mongodb://mongodb:27017/lunaz
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production-min-32-chars}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      S3_BUCKET: ${S3_BUCKET:-lunaz-products}
      S3_REGION: ${S3_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      FRONTEND_WEB_URL: http://localhost:3000
      API_URL: ${API_URL:-http://localhost:4000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      SSLCOMMERZ_SANDBOX: ${SSLCOMMERZ_SANDBOX:-true}
      SSLCOMMERZ_STORE_ID: ${SSLCOMMERZ_STORE_ID:-}
      SSLCOMMERZ_STORE_PASSWORD: ${SSLCOMMERZ_STORE_PASSWORD:-}
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - lunaz-network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: http://localhost:4000/api/v1
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    container_name: lunaz-web
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - lunaz-network

volumes:
  mongodb_data:
    name: lunaz-mongodb-data

networks:
  lunaz-network:
    name: lunaz-network
    driver: bridge
