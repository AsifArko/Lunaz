# ============================================================================
# Lunaz — EC2 Production (Image-only, no build)
# ============================================================================
# Uses pre-built images from GHCR. Set TAG and REGISTRY_IMAGE before running.
# Usage: TAG=abc1234 REGISTRY_IMAGE=ghcr.io/owner/repo docker compose -f docker-compose.ec2.yml up -d
# ============================================================================

services:
  # ─────────────────────────────────────────────────────────────────────────────
  # Backend (Express.js API)
  # ─────────────────────────────────────────────────────────────────────────────
  backend:
    image: ${REGISTRY_IMAGE}/backend:${TAG}
    container_name: lunaz-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 4000
      MONGODB_URI: ${MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      FRONTEND_WEB_URL: ${FRONTEND_WEB_URL}
      FRONTEND_MANAGE_URL: ${FRONTEND_MANAGE_URL}
      API_URL: ${API_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      SSLCOMMERZ_SANDBOX: ${SSLCOMMERZ_SANDBOX:-true}
      SSLCOMMERZ_STORE_ID: ${SSLCOMMERZ_STORE_ID:-}
      SSLCOMMERZ_STORE_PASSWORD: ${SSLCOMMERZ_STORE_PASSWORD:-}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - lunaz-network

  # ─────────────────────────────────────────────────────────────────────────────
  # Web (Customer-facing React app) — Port 3000
  # ─────────────────────────────────────────────────────────────────────────────
  web:
    image: ${REGISTRY_IMAGE}/web:${TAG}
    container_name: lunaz-web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - lunaz-network

  # ─────────────────────────────────────────────────────────────────────────────
  # Manage (Admin dashboard) — Port 3001
  # ─────────────────────────────────────────────────────────────────────────────
  manage:
    image: ${REGISTRY_IMAGE}/manage:${TAG}
    container_name: lunaz-manage
    restart: unless-stopped
    ports:
      - "3001:80"
    env_file:
      - .env
    environment:
      VITE_API_URL: ${API_URL}/api/v1
    depends_on:
      backend:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - lunaz-network

networks:
  lunaz-network:
    name: lunaz-network
    driver: bridge
