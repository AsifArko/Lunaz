# Lunaz — Staging Docker Compose
# Usage: docker compose -f docker-compose.staging.yml up -d
#
# Staging environment for pre-production testing.
# Uses environment variables from .env.staging or GitHub secrets.

services:
  # ─────────────────────────────────────────────────────────────────────────────
  # Backend (Express.js API)
  # ─────────────────────────────────────────────────────────────────────────────
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY:-lunaz}/backend:${IMAGE_TAG:-staging-latest}
    container_name: lunaz-backend-staging
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: staging
      PORT: 4000
      MONGODB_URI: ${MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      # S3 (image uploads)
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      # CORS
      FRONTEND_WEB_URL: ${FRONTEND_WEB_URL}
      FRONTEND_MANAGE_URL: ${FRONTEND_MANAGE_URL}
      # Stripe (test mode)
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    healthcheck:
      test:
        ["CMD", "wget", "-q", "--spider", "http://localhost:4000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - lunaz-staging-network

  # ─────────────────────────────────────────────────────────────────────────────
  # Web (Customer-facing React app)
  # ─────────────────────────────────────────────────────────────────────────────
  web:
    image: ghcr.io/${GITHUB_REPOSITORY:-lunaz}/web:${IMAGE_TAG:-staging-latest}
    container_name: lunaz-web-staging
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - lunaz-staging-network

  # ─────────────────────────────────────────────────────────────────────────────
  # Manage (Admin dashboard React app)
  # ─────────────────────────────────────────────────────────────────────────────
  manage:
    image: ghcr.io/${GITHUB_REPOSITORY:-lunaz}/manage:${IMAGE_TAG:-staging-latest}
    container_name: lunaz-manage-staging
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      backend:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - lunaz-staging-network

# ─────────────────────────────────────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────────────────────────────────────
networks:
  lunaz-staging-network:
    name: lunaz-staging-network
    driver: bridge
