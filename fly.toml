# fly.toml app configuration file for Lunaz (backend + web + manage)
# See https://fly.io/docs/reference/configuration/

app = 'lunaz'
primary_region = 'ewr'

[build]
  dockerfile = "Dockerfile"

[env]
  # Backend listens on 4000 internally; nginx proxies /api to it
  PORT = "4000"
  NODE_ENV = "production"
  # Set these via: fly secrets set MONGODB_URI=... JWT_SECRET=...
  # Optional: FRONTEND_WEB_URL, FRONTEND_MANAGE_URL (default to https://lunaz.fly.dev and https://lunaz.fly.dev/manage)

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
